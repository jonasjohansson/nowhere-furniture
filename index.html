<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Nowhere Furniture Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spline+Sans:wght@400;500;600&family=Spline+Sans+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css?v=20" />
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<div id="app">

  <!-- LEFT: catalog ---------------------------------------------------------->
  <aside id="left">
    <div class="section">
      <h2 data-i18n="catalog">Catalog</h2>
      <div id="catalog-list"></div>
    </div>
  </aside>

  <!-- CENTER: 3D stage -------------------------------------------------------->
  <main id="stage">
    <div id="toolbar">
      <div class="group">
        <button data-act="move" class="active" title="Move (W)" data-i18n="tbMove">↔ Move</button>
        <button data-act="rotate" title="Rotate (E)" data-i18n="tbRotate">⟳ Rotate</button>
      </div>
      <div class="group">
        <button data-act="snap" class="active" title="Snap (S)" data-i18n="tbSnap">⊞ Snap</button>
        <button data-act="dims" title="Dimensions (M)" data-i18n="tbDims">⊹ Dims</button>
      </div>
      <div class="group">
        <button data-act="add-sheet" data-i18n="tbSheet">+ Sheet</button>
        <button data-act="add-timber" data-i18n="tbReglar">+ Reglar</button>
      </div>
      <div class="group">
        <button data-act="undo" title="Undo (⌘Z)" data-i18n="tbUndo" disabled>↺ Undo</button>
        <button data-act="redo" title="Redo (⌘⇧Z)" data-i18n="tbRedo" disabled>↻ Redo</button>
      </div>
      <div class="group">
        <button data-act="duplicate" title="Duplicate (D)" data-i18n="tbDuplicate">⧉ Duplicate</button>
        <button data-act="delete" title="Delete (Del)" data-i18n="tbDelete">🗑 Delete</button>
      </div>
      <div class="group">
        <button data-act="frame" title="Fit view (F)" data-i18n="tbFit">⤢ Fit</button>
      </div>
      <div class="group">
        <button id="lang-toggle" title="Català / English">CA</button>
      </div>
    </div>
    <div id="canvas"></div>
    <div id="toast"></div>
  </main>

  <!-- RIGHT: panels ----------------------------------------------------------->
  <aside id="right">
    <div class="section" id="design-section">
      <h2 data-i18n="design">Design</h2>
      <div id="design-head"></div>
      <div id="params"></div>
      <div id="buildinfo"></div>
      <div class="field" style="margin-top:12px">
        <label data-i18n="material">Material</label>
        <select id="material-select"></select>
      </div>
    </div>

    <div class="section" id="inspect-section">
      <h2 data-i18n="selectedPart">Selected part</h2>
      <div id="inspect-empty" class="muted small" data-i18n="clickPart">Click a part to edit it.</div>
      <div id="inspect-body" hidden>
        <div class="field"><label data-i18n="fName">Name</label><input id="i-name" type="text" /></div>
        <div class="field"><label data-i18n="fStock">Stock</label><select id="i-stock"></select></div>
        <div class="field"><label data-i18n="fWidth">Width</label><input id="i-w" type="number" step="1" /><span class="u">mm</span></div>
        <div class="field"><label data-i18n="fHeight">Height</label><input id="i-h" type="number" step="1" /><span class="u">mm</span></div>
        <div class="field"><label data-i18n="fDepth">Depth</label><input id="i-d" type="number" step="1" /><span class="u">mm</span></div>
      </div>
    </div>

    <div class="section" id="bom-section">
      <h2 data-i18n="bom">Bill of materials</h2>
      <div id="bom-summary" class="muted small"></div>
      <div id="bom"></div>
    </div>

    <div class="section">
      <h2 data-i18n="export">Export</h2>
      <div class="btn-grid">
        <button data-exp="pdf" data-i18n="expPdf" style="grid-column:1 / -1">📄 Download PDF</button>
        <button data-exp="save" data-i18n="expSave">Save .json</button>
        <button data-exp="load" data-i18n="expLoad">Load .json</button>
      </div>
      <input id="file-input" type="file" accept="application/json" hidden />
    </div>
  </aside>
</div>
<script type="module" src="src/app.js?v=20"></script>
</body>
</html>
